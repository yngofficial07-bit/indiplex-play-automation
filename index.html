<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INDIPLEX | Aesthetic Cinema</title>
    
    <script>
        // Energy reset logic to prevent blank screen/popups
        let currentSaved = localStorage.getItem('indiplex_credits');
        if (!currentSaved || parseInt(currentSaved) <= 0) {
            localStorage.setItem('indiplex_credits', 240);
        }

        const savedCredits = parseInt(localStorage.getItem('indiplex_credits'));
        const isLogged = localStorage.getItem('isLogged') === 'true';
        
        if (!isLogged && savedCredits <= 0) {
            const adScript = document.createElement('script');
            adScript.src = "https://pl28716477.effectivegatecpm.com/08/29/b7/0829b70499d7f6dcbbc947340a47ca65.js";
            document.head.appendChild(adScript);
        }
    </script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@800&family=Orbitron:wght@400;900&family=Roboto:wght@300;400;700&family=Montserrat:wght@200;900&display=swap');
        
        :root { 
            --red: #ff0000; 
            --glass-border: rgba(255, 255, 255, 0.1); 
            --neon-blue: #00d2ff;
        }

        body, html { 
            margin: 0; padding: 0; background: #000; color: white; 
            font-family: 'Roboto', sans-serif; overflow-x: hidden; height: 100%; 
        }

        /* --- ABYSSAL VOID INTRO --- */
        #intro { 
            height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center; 
            background: #000; position: fixed; z-index: 9999; transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
            top:0; left:0; overflow: hidden;
        }
        #abyss-canvas { position: absolute; inset: 0; z-index: 1; }
        .vignette-intro { 
            position: absolute; inset: 0; z-index: 50; pointer-events: none; 
            background: radial-gradient(circle, transparent 10%, #000 95%); 
        }
        #heartbeat-line { 
            position: absolute; width: 0; height: 1.5px; background: #fff; 
            box-shadow: 0 0 25px #fff, 0 0 50px #fff; z-index: 1000; 
            animation: slice 3s cubic-bezier(0.1, 0, 0.1, 1) forwards; 
        }
        @keyframes slice { 0% { width: 0; opacity: 0; } 50% { width: 100%; opacity: 1; } 100% { width: 0; opacity: 0; } }
        
        .monolith-stage { position: relative; z-index: 100; perspective: 3000px; }
        .silver-block {
            position: relative; width: clamp(300px, 85vw, 1000px); height: clamp(160px, 35vh, 450px);
            background: linear-gradient(135deg, #000 0%, #333 15%, #aaa 35%, #fff 50%, #aaa 65%, #333 85%, #000 100%);
            background-size: 300% 300%; border-radius: 2px; display: flex; justify-content: center; align-items: center;
            opacity: 0; transform: scale(0.1) translateZ(-2000px) rotateX(20deg);
            box-shadow: 0 0 150px rgba(255, 255, 255, 0.15), inset 0 0 100px rgba(0, 0, 0, 1);
            animation: monolithArrival 1.8s cubic-bezier(0.1, 0.9, 0.2, 1) forwards 3.2s, chromeFlow 6s linear infinite;
        }
        @keyframes monolithArrival { 
            0% { opacity: 0; transform: scale(0.1) translateZ(-2000px) rotateX(20deg); filter: blur(50px); } 
            100% { opacity: 1; transform: scale(1) translateZ(0) rotateX(0deg); filter: blur(0); } 
        }
        @keyframes chromeFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        
        .indiplex-brand { 
            font-family: 'Syncopate', sans-serif; font-size: clamp(2.5rem, 15vw, 11rem); font-weight: 800; 
            letter-spacing: 20px; color: #000; text-transform: uppercase; mix-blend-mode: multiply; 
            opacity: 0; animation: textManifest 2s cubic-bezier(0.19, 1, 0.22, 1) forwards 4s; 
        }
        @keyframes textManifest { 
            0% { opacity: 0; letter-spacing: 100px; transform: scale(0.8); } 
            100% { opacity: 1; letter-spacing: -6px; transform: scale(1); } 
        }

        /* --- NAVIGATION --- */
        nav { 
            position: fixed; top: 0; width: 100%; height: 85px; z-index: 5000; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 5%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(25px); 
            border-bottom: 1px solid var(--glass-border); box-sizing: border-box; 
        }
        .logo-nav { 
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 26px; 
            background: linear-gradient(to bottom, #fff 30%, #ff0000 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; 
        }
        .logo-motto { font-size: 7px; color: #666; letter-spacing: 1.2px; margin-top: 4px; font-family: 'Montserrat'; font-weight: 900; text-transform: uppercase; }

        /* --- HUB CATEGORIES --- */
        .hub-categories {
            display: flex; gap: 10px; overflow-x: auto; padding: 15px 5%; background: rgba(0,0,0,0.95);
            scrollbar-width: none; white-space: nowrap; 
            position: fixed; top: 85px; width: 100%; z-index: 4000;
            border-bottom: 1px solid rgba(255,255,255,0.05); box-sizing: border-box;
        }
        .hub-categories::-webkit-scrollbar { display: none; }
        .cat-chip {
            background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 8px 18px; 
            border-radius: 4px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; transition: 0.3s;
        }
        .cat-chip:hover, .cat-chip.active { background: #ff9900; color: #000; border-color: #ff9900; font-weight: 900; }

        /* --- 3D RGB CARDS SECTION --- */
        #vanta-canvas { position: fixed; inset: 0; z-index: 1; }
        #home-page { display: none; position: relative; z-index: 10; perspective: 1200px; padding-top: 155px; } 
        
        .section-title { 
            padding-left: 5%; font-family: 'Orbitron'; font-size: 14px; color: var(--red); 
            margin: 35px 0 15px; border-left: 4px solid var(--red); margin-left: 5%; 
            padding-left: 12px; letter-spacing: 2px; font-weight: 900;
        }
        .container { 
            padding: 0 5% 40px; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 30px; 
        }
        
        .card { 
            position: relative; border-radius: 20px; overflow: hidden; background: #000; 
            cursor: pointer; padding: 2px; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); 
            height: 320px; transform-style: preserve-3d; 
        }
        .card::before { 
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; 
            background: conic-gradient(from 0deg, transparent, #ff0000, #00d2ff, #7a00ff, #ff0000); 
            animation: rotateBorder 4s linear infinite; z-index: -2; opacity: 0; transition: 0.5s; 
        }
        .card:hover::before { opacity: 1; }
        .card:hover { transform: translateY(-15px) rotateX(10deg) rotateY(6deg); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .card::after { content: ""; position: absolute; inset: 4px; background: #000; border-radius: 17px; z-index: -1; }
        @keyframes rotateBorder { 100% { transform: rotate(360deg); } }
        
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 17px 17px 0 0; transition: 0.5s; }
        .card:hover img { transform: scale(1.05); }
        .card h3 { 
            font-size: 11px; font-family: 'Montserrat'; font-weight: 700; padding: 15px; 
            text-align: center; margin: 0; height: 50px; display: flex; align-items: center; justify-content: center; 
        }
        .peek-info { 
            position: absolute; bottom: 55px; left: 0; width: 100%; padding: 10px; 
            background: linear-gradient(transparent, rgba(0,0,0,0.9)); opacity: 0; 
            transition: 0.4s; font-size: 9px; font-weight: 900; text-align: center; color: var(--neon-blue); 
        }
        .card:hover .peek-info { opacity: 1; }

        /* --- SIDEBAR --- */
        #side-menu { 
            position: fixed; top: 0; right: -320px; width: 310px; height: 100vh; 
            background: rgba(8,8,8,0.98); backdrop-filter: blur(40px); z-index: 6000; 
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); padding: 40px 25px 80px; 
            border-left: 1px solid var(--glass-border); 
            overflow-y: auto; box-sizing: border-box; 
        }
        #side-menu.active { right: 0; }
        .menu-item { 
            padding: 15px; color: #888; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); 
            font-family: 'Montserrat'; font-size: 12px; display: flex; align-items: center; gap: 12px; transition: 0.3s;
        }
        .menu-item:hover { color: #fff; background: rgba(255,0,0,0.1); padding-left: 25px; }

        #credit-badge {
            position: fixed; bottom: 20px; right: 20px; background: rgba(20,20,20,0.8);
            backdrop-filter: blur(10px); color: #fff; padding: 8px 15px; border-radius: 30px;
            font-family: 'Orbitron'; font-size: 9px; z-index: 10000; border: 1px solid rgba(255,255,255,0.1);
            letter-spacing: 1px; display: flex; align-items: center; gap: 8px;
        }

        #details-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.99); backdrop-filter: blur(30px); 
            display: none; z-index: 8000; overflow-y: auto; padding: 80px 5%; 
        }
        #player-ui { position: fixed; inset: 0; background: #000; display: none; z-index: 25000; }
    </style>
</head>
<body>

<div id="intro">
    <canvas id="abyss-canvas"></canvas>
    <div class="vignette-intro"></div>
    <div id="heartbeat-line"></div>
    <div class="monolith-stage">
        <div class="silver-block"><h1 class="indiplex-brand">INDIPLEX</h1></div>
    </div>
</div>

<div id="vanta-canvas"></div>

<div id="home-page">
    <nav>
        <div class="logo-container" onclick="logoTrigger()" style="cursor:pointer;">
            <div class="logo-nav">INDIPLEX</div>
            <div class="logo-motto">YOUR PRIVACY IS OUR RESPONSIBILITY</div>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
            <input type="text" id="searchInput" oninput="searchVega(this.value)" placeholder="Search Movie..." style="background:rgba(255,255,255,0.05); border:1px solid #444; color:white; padding:10px 18px; border-radius:25px; outline:none; width:150px; font-family:'Montserrat';">
            <div onclick="toggleMenu()" style="cursor:pointer; font-size:22px; color:white;"><i class="fa-solid fa-bars-staggered"></i></div>
        </div>
    </nav>

    <div class="hub-categories" id="hub-bar">
        <div class="cat-chip active" onclick="loadVegaGenre('all', this)">ALL</div>
        <div class="cat-chip" onclick="loadVegaGenre('Bollywood', this)">BOLLYWOOD</div>
        <div class="cat-chip" onclick="loadVegaGenre('Hollywood', this)">HOLLYWOOD</div>
        <div class="cat-chip" onclick="loadVegaGenre('Netflix', this)">NETFLIX</div>
    </div>

    <div id="main-scroll-area">
        <div id="search-section" style="display:none; padding-top:20px;">
            <h2 class="section-title">SEARCH RESULTS <button onclick="clearSearch()" style="float:right; background:red; border:none; color:white; padding:5px 12px; border-radius:20px; font-size:10px; margin-right:5%; cursor:pointer;">CLOSE</button></h2>
            <div class="container" id="search-grid"></div>
        </div>

        <div id="main-content">
            <h2 class="section-title" id="grid-title">LATEST MOVIES (VEGA)</h2>
            <div class="container" id="vega-grid"></div>
        </div>
    </div>
</div>

<div id="side-menu">
    <div onclick="toggleMenu()" style="text-align:right; font-size:30px; cursor:pointer; margin-bottom:15px; color:red;">&times;</div>
    <div class="menu-item" onclick="location.reload()"><i class="fa-solid fa-house"></i> HOME</div>
    <div style="color:red; font-size:10px; font-family:'Orbitron'; padding:15px; letter-spacing:2px;">CATEGORIES</div>
    <div class="menu-item" onclick="loadVegaGenre('Bollywood')"><i class="fa-solid fa-film"></i> BOLLYWOOD</div>
    <div class="menu-item" onclick="loadVegaGenre('Hollywood')"><i class="fa-solid fa-clapperboard"></i> HOLLYWOOD</div>
</div>

<div id="credit-badge">ENERGY: --</div>
<div id="player-ui">
    <div onclick="closePlayer()" style="position:fixed; top:20px; left:20px; font-size:30px; color:white; cursor:pointer; z-index:30001;"><i class="fa-solid fa-arrow-left"></i></div>
    <iframe id="video-frame" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
</div>

<script>
    // Scraper URL logic (Same as indiplex-bot)
    const SCRAPER_URL = "https://raw.githubusercontent.com/yngofficial07-bit/indiplex-bot/main/movies.json";
    let allMovies = [];

    async function loadHome() {
        const res = await fetch(SCRAPER_URL);
        allMovies = await res.json();
        renderVegaGrid('vega-grid', allMovies);
    }

    function renderVegaGrid(id, items) {
        document.getElementById(id).innerHTML = items.map(i => `
            <div class="card" onclick="playMovie('${i.link}')">
                <div class="peek-info">VEGA SOURCE</div>
                <img src="${i.image}">
                <h3>${i.title}</h3>
            </div>
        `).join('');
    }

    function playMovie(link) {
        document.getElementById('player-ui').style.display = 'block';
        document.getElementById('video-frame').src = link;
    }

    function searchVega(query) {
        const s = document.getElementById('search-section');
        const m = document.getElementById('main-content');
        if(query.length < 2) { s.style.display='none'; m.style.display='block'; return; }
        const filtered = allMovies.filter(m => m.title.toLowerCase().includes(query.toLowerCase()));
        s.style.display='block'; m.style.display='none';
        renderVegaGrid('search-grid', filtered);
    }

    function loadVegaGenre(genre, el) {
        if(el) { document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); }
        const filtered = genre === 'all' ? allMovies : allMovies.filter(m => m.title.toLowerCase().includes(genre.toLowerCase()));
        renderVegaGrid('vega-grid', filtered);
    }

    // Existing UI scripts (Untouched)
    function closePlayer() { document.getElementById('player-ui').style.display = 'none'; document.getElementById('video-frame').src = ''; }
    function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
    function clearSearch() { document.getElementById('searchInput').value=''; searchVega(''); }
    
    // Intro & Vanta init
    const canvas = document.getElementById('abyss-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    
    setTimeout(() => {
        document.getElementById('intro').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('home-page').style.display = 'block';
            VANTA.NET({ el: "#vanta-canvas", color: 0xff0000, backgroundColor: 0x0, points: 12 });
        }, 1200);
        loadHome();
    }, 6500);
</script>
</body>
</html>
